name: Deploy Pages

# Publishes the committed client dashboards to GitHub Pages. Not auto-triggered:
# it runs either as the final step of the Monitor Pipeline (called via
# workflow_call after a run commits fresh artifacts) or on its own when manually
# dispatched to republish without re-running the pipeline.
on:
  workflow_call:
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Never run two Pages deploys at once; let an in-flight one finish.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Latest tip of the ref so we publish the artifacts the pipeline just
          # committed, not the (older) dispatch SHA.
          ref: ${{ github.ref_name }}

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # Assemble _site/ from each clients/*/artifacts dashboard plus a root
      # landing page linking to them. stdlib only — no install step needed.
      - name: Assemble site
        run: python -m tooling.build_pages --clients-dir clients --out _site

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4
