name: Monitor Pipeline

on:
  # Manual trigger ONLY — nothing runs automatically. The pipeline (collect →
  # analyse → commit) and its test gate fire solely when dispatched from the
  # Actions tab. push/pull_request triggers are intentionally omitted so no run
  # (and no API spend) ever starts on its own. Re-enable weekly runs later by
  # uncommenting the schedule:
  # schedule:
  #   - cron: "0 7 * * 1"   # Monday 07:00 UTC
  workflow_dispatch:    # manual trigger from the Actions tab ("Run workflow")
    inputs:
      client:
        description: "Which client(s) to run the full pipeline for"
        type: choice
        default: all
        options:
          - all
          - aerospace
          - healthcare-regulatory

permissions:
  contents: write       # required to commit artifacts back to the repo
  pages: write          # deploy job publishes the dashboards to Pages
  id-token: write

jobs:
  # ── Select client(s) ───────────────────────────────────────────────────
  # Turn the `client` dispatch input into the run matrix: "all" runs both test
  # industries, otherwise just the one chosen. One dispatch = the full pipeline
  # for the selected client(s), then a single Pages publish.
  setup:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.pick.outputs.matrix }}
    steps:
      - id: pick
        run: |
          if [ "${{ inputs.client }}" = "all" ]; then
            echo 'matrix={"client":["aerospace","healthcare-regulatory"]}' >> "$GITHUB_OUTPUT"
          else
            echo 'matrix={"client":["${{ inputs.client }}"]}' >> "$GITHUB_OUTPUT"
          fi

  # ── Test gate ──────────────────────────────────────────────────────────
  # Runs on every event. The pipeline job depends on this, so a broken
  # frontend (e.g. items silently dropping out of tier buckets) blocks the
  # scrape-and-commit instead of publishing a broken dashboard with a green
  # build. Node is required: the frontend smoke tests execute the real
  # app.js, and CI_REQUIRE_FRONTEND=1 turns a missing node into a failure
  # rather than a silent skip.
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install engine
        run: pip install -e ".[dev]"

      - name: Run test suite (frontend smoke tests enforced)
        run: pytest -q
        env:
          CI_REQUIRE_FRONTEND: "1"

  run:
    needs: [setup, test]   # test gate must pass before any scrape/spend
    strategy:
      fail-fast: false  # one client's failure does not cancel the others
      max-parallel: 2   # clients run concurrently to cut wall time. Safe because
                        # each writes its own clients/<name>/artifacts/ dir (no file
                        # conflict) and the commit step rebase-retries the push, so
                        # concurrent pushes to the branch resolve cleanly.
      matrix: ${{ fromJSON(needs.setup.outputs.matrix) }}

    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install engine
        run: pip install -e ".[dev]"

      # ── Run pipeline ─────────────────────────────────────────────────
      # The pipeline exits with code 1 on any failure (missing env vars,
      # network errors that lose all sources, schema validation failure).
      # GitHub Actions treats non-zero exit codes as step failures, so this
      # step will fail loudly without any extra shell error-trapping needed.
      - name: Run pipeline – ${{ matrix.client }}
        run: |
          python -m monitor_engine \
            --config "clients/${{ matrix.client }}/config.json" \
            --output "clients/${{ matrix.client }}/artifacts" \
            --archive "clients/${{ matrix.client }}/artifacts/archive.json"
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          # Client-specific source keys, matching the auth_env_var values in
          # each config.json. Unused vars are harmless for clients that don't
          # declare them (e.g. aerospace ignores CONGRESS_API_KEY).
          CONGRESS_API_KEY: ${{ secrets.CONGRESS_API_KEY }}

      # ── Belt-and-suspenders validation ──────────────────────────────
      # The pipeline already validates its own output, but this step
      # re-reads the written artifact independently, catching any file-
      # system write error that might slip through.
      - name: Validate artifact – ${{ matrix.client }}
        run: |
          python -c "
          import sys
          from pathlib import Path
          from monitor_engine.models import RunOutput
          p = Path('clients/${{ matrix.client }}/artifacts/run_output.json')
          if not p.exists():
              print('[FAIL] artifact not found: ' + str(p), file=sys.stderr)
              sys.exit(1)
          try:
              RunOutput.model_validate_json(p.read_text())
              print('[OK] ' + str(p))
          except Exception as exc:
              print('[FAIL] ' + str(p) + ': ' + str(exc), file=sys.stderr)
              sys.exit(1)
          "

      # ── Dark-source alert ───────────────────────────────────────────
      # Surface any source that errored or returned nothing into the run's
      # Step Summary and as ::warning:: annotations, so the operator is
      # alerted on the run page. Non-failing (one dead source must not block
      # the brief); the pipeline already tolerates per-source failures.
      - name: Source health alert – ${{ matrix.client }}
        if: always()
        run: |
          python - "clients/${{ matrix.client }}/artifacts/run_output.json" <<'PY'
          import json, os, sys
          from pathlib import Path
          p = Path(sys.argv[1])
          if not p.exists():
              sys.exit(0)
          health = json.loads(p.read_text()).get("source_health") or {}
          bad = {k: v for k, v in health.items() if v.get("error") or v.get("zero_results")}
          summary = os.environ.get("GITHUB_STEP_SUMMARY")
          lines = [f"### Source health — ${{ matrix.client }}",
                   f"{len(bad)} of {len(health)} sources need attention." if bad
                   else f"All {len(health)} sources healthy."]
          for sid, v in bad.items():
              reason = v.get("error") or "zero items returned"
              lines.append(f"- ⚠ **{sid}**: {reason}")
              print(f"::warning title=Source {sid}::{reason}")
          if summary:
              Path(summary).write_text("\n".join(lines) + "\n", encoding="utf-8")
          print("\n".join(lines))
          PY

      # ── Commit artifacts back to the repo ───────────────────────────
      # The static site (index.html + run_output.json) is the output
      # contract.  archive.json is the rolling history that powers
      # what's-new diffs on future runs.  All three are committed.
      - name: Commit artifacts – ${{ matrix.client }}
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add "clients/${{ matrix.client }}/artifacts/"
          # Only commit if something actually changed.
          git diff --staged --quiet \
            && echo "No changes to commit for ${{ matrix.client }}" \
            || git commit -m "chore: ${{ matrix.client }} artifacts $(date -u +%Y-%m-%dT%H:%M:%SZ) [skip ci]"
          # Both matrix clients check out the same dispatch SHA, so the second to
          # finish pushes onto a branch the first already advanced. Rebase our
          # single artifact commit onto the latest remote tip and retry, so the
          # jobs never race on a non-fast-forward rejection.
          BRANCH="${{ github.ref_name }}"
          for attempt in 1 2 3; do
            git push origin "HEAD:$BRANCH" && break
            echo "push rejected (attempt $attempt) — rebasing on origin/$BRANCH"
            git pull --rebase origin "$BRANCH"
          done

  # ── Publish ─────────────────────────────────────────────────────────────
  # Final step of the one-button pipeline: once the run job has committed fresh
  # artifacts, publish all dashboards to Pages. Reuses the Deploy Pages workflow
  # so the deploy logic lives in exactly one place.
  deploy:
    needs: run
    # Publish whenever the pipeline actually ran — even if one client failed, the
    # others' fresh artifacts (and every client's last-good) should still go live.
    # Only from the default branch: the github-pages environment restricts
    # deployments to main, so attempting it from a feature branch just fails the
    # run. Skipped if the test gate blocked the run or the run was cancelled.
    if: ${{ !cancelled() && github.ref_name == 'main' && (needs.run.result == 'success' || needs.run.result == 'failure') }}
    uses: ./.github/workflows/pages.yml
